steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=BUILDPLATFORM=linux/amd64'
      - '--build-arg=GITHUB_TOKEN=${_GITHUB_TOKEN}'
      - '-t'
      - 'us-docker.pkg.dev/$PROJECT_ID/backend/futures:next'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'
images:
  - 'us-docker.pkg.dev/$PROJECT_ID/backend/futures:next'
timeout: '600s'
